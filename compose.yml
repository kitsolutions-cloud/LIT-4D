services:
  email-provider:
    build:
      context: ./email-provider
    env_file:
      - ./email-provider/.env
    ports:
      - '1080:1080'

  oauth-provider:
    build:
      context: ./oauth-provider
    env_file:
      - ./oauth-provider/.env
    volumes:
      - ./oauth-provider/providers:/opt/keycloak/providers
      - ./oauth-provider/helms:/opt/keycloak/data/import
    depends_on:
      sqldb-provider:
        condition: service_started

  sqldb-provider:
    build:
      context: ./sqldb-provider
    env_file:
      - ./sqldb-provider/.env
    volumes:
      - ./sqldb-provider/.data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  aws-services-provider:
    build:
      context: ./aws-services-provider
    env_file:
      - ./aws-services-provider/.env
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
      - ./aws-services-provider/ready.d/:/etc/localstack/init/ready.d/

  mongodb-provider:
    build:
      context: ./mongodb-provider
    env_file:
      - ./mongodb-provider/.env
    volumes:
      - ./mongodb-provider/.data/db:/data/db

  feature-flag-provider:
    build:
      context: ./feature-flag-provider
    env_file:
      - ./feature-flag-provider/.env
    volumes:
      - ./feature-flag-provider/.data/uploads:/usr/local/src/app/packages/back-end/uploads

  monitoring-provider-loki:
    build:
      context: ./monitoring-provider/loki
    env_file:
      - ./monitoring-provider/loki/.env
    volumes:
      - ./monitoring-provider/loki/.data:/loki
    command: "-config.file=/etc/loki/local-config.yaml"
  
  monitoring-provider-promtail:
    build:
      context: ./monitoring-provider/promtail
    env_file:
      - ./monitoring-provider/promtail/.env
    volumes:
      - ./monitoring-provider/promtail/config.yaml:/etc/promtail/config.yaml
      - ./monitoring-provider/promtail/app-logs/:/var/log/ # Adjust the path as needed for your application logs
    command: "--config.file=/etc/promtail/config.yaml"

  monitoring-provider-grafana:
    build:
      context: ./monitoring-provider/grafana
    env_file:
      - ./monitoring-provider/grafana/.env
    volumes:
      - ./monitoring-provider/grafana/.data:/var/lib/grafana
      - ./monitoring-provider/grafana/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml
    depends_on:
      - monitoring-provider-loki
      - monitoring-provider-promtail
